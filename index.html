<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <div class="main-container">
      <div class="outer-body-container">
        <div class="input-screen-container"></div>
        <div class="button-container">
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '1';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            1
          </button>

          <button
            class="buttons"
            
            onclick="
              currentDisplay += '2';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            2
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '3';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            3
          </button>
          <button
            class="buttons calc"
            
            onclick="
              currentDisplay += '+';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            +
          </button>

          <button
            class="buttons"
            
            onclick="
              currentDisplay += '4';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            4
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '5';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            5
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '6';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            6
          </button>
          <button
            class="buttons calc"
            
            onclick="
              currentDisplay += '-';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            -
          </button>

          <button
            class="buttons"
            
            onclick="
              currentDisplay += '7';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            7
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '8';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            8
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '9';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            9
          </button>
          <button
            class="buttons calc"
            
            onclick="
              currentDisplay += '*';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            x
          </button>
          <button
            class="buttons calc"
            
            onclick="
              currentDisplay += '.';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            .
          </button>
          <button
            class="buttons"
            
            onclick="
              currentDisplay += '0';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            0
          </button>
          <button
            class="buttons calc"
            
            onclick="
              let result = eval(currentDisplay);

              currentDisplay = result;
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            =
          </button>
          <button
            class="buttons calc"
            
            onclick="
              currentDisplay += '/';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            /
          </button>

          <button
            class="buttons c"
            
            onclick="
              currentDisplay = '';
              document.querySelector('.input-screen-container').innerText =
                currentDisplay;
            "
          >
            C
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentDisplay = "";
      document.querySelector(".input-screen-container").innerText =
        currentDisplay;
    </script>
  </body>
</html>
>
